
petitions:
  - text: Let us complete our morning prayer unto the Lord.
  - text: Help us; save us; have mercy on us; and keep us, O God, by Thy grace.
  - text: That the whole evening may be perfect, holy, peaceful, and sinless, let us ask of the Lord.
    response: Grant this, O Lord.
  - text: An angel of peace, a faithful guide, a guardian of our souls and bodies, let us ask of the Lord.
    response: Grant this, O Lord.
  - text: Pardon and remission of our sins and transgressions, let us ask of the Lord.
    response: Grant this, O Lord.
  - text: All things good and profitable for our souls and peace for the world, let us ask of the Lord.
    response: Grant this, O Lord.
  - text: That we may complete the remaining time of our life in peace and repentance, let us ask of the Lord.
    response: Grant this, O Lord.
  - text: A Christian ending to our life, painless, blameless, peaceful, and a good defense before the fearful judgment seat of Christ, let us ask of the Lord.
    response: Grant this, O Lord.
  - text: |
      Calling to remembrance our all-holy, immaculate, most [*People, quietly: "Most Holy Theotokos, save us"*] blessed and glorious Lady, the Theotokos and ever-virgin Mary, with all the saints, let us commend ourselves and each other and all our life unto Christ our God.
    response: To Thee, O Lord.

prayer:
  text: For Thou art the God of mercy and compassions and love toward mankind, and unto Thee we ascribe glory, to the Father and to the Son and to the Holy Spirit, now and ever, and unto ages of ages.