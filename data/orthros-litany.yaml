
petitions: TODO
  - text: Have mercy on us, O God, according to thy great mercy, we pray thee, hearken and have mercy.
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.
  - text: Again we pray for all pious and Orthodox Christians.
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.
  - text: Again we pray for our father and Metropolitan SABA.
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.
  - text: "Again we pray for our brethren: the priests, hieromonks, deacons, hierodeacons and monastics and all our brotherhood in Christ."
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.
  - text: Again we pray for mercy, life, peace, health, salvation, visitation, pardon and remission of sins for (the servants of God, *NN.*, and) all Orthodox Christians of true worship, who live and dwell in this community.
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.
  - text: Again we pray for the blessed and ever-memorable founders of this holy church (and for the servants of God,*NN.*,) and all of our fathers and brethren, the Orthodox departed this life before us, who here and in all the world lie asleep in the Lord.
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.
  - text: Again we pray for those who bear fruit and do good works in this holy and allvenerable temple, those who serve and those who sing and all the people here present, who await thy great and rich mercy.
    response: Lord, have mercy. Lord, have mercy. Lord, have mercy.

prayer:
  text: For thou art a merciful God and lovest mankind, and unto thee we ascribe glory, to the Father and to the Son and to the Holy Spirit, now and ever, and unto ages of ages.