
petitions:
  - text: Having partaken of the divine, holy, immaculate, immortal, heavenly, life-giving, and dread mysteries of Chirst, let us worthily give thanks unto the Lord.
  - text: Help us; save us; have mercy on us; and keep us, O God, by Thy grace.
  - text: Asking that the whole day may be perfect, holy, peaceful, and sinless, let us commend ourselves and each other and all our life unto Christ our God.
    response: To Thee, O Lord.

prayer:
  text: For Thou art our sanctification, and unto Thee we ascribe glory, to the Father and to the Son and to the Holy Spirit, now and ever and unto ages of ages.