
petitions:
  - text: Having commemorated all the saints, again and again in peace, let us pray to the Lord.
  - text: For the precious gifts which have been spread forth and sanctified, let us pray to the Lord.
  - text: That our God, Who lovest mankind, having received them upon His holy, most heavenly, and ideal altar as an aroma of spiritual sweetness, will send down upon us in return His divine grace and the gift of the HolySpirit, let us pray.
  - text: Asking for the unity of the faith and the communion of the Holy Spirit, let us commend ourselves and each other and all our life unto Christ our God.
    response: To Thee, O Lord.