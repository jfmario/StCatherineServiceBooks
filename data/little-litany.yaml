
petitions:
  - text: Again, and again in peace, let us pray to the Lord.
  - text: Help us; save us; have mercy on us; and keep us, O God, by Thy grace.
  - text: |
      Calling to remembrance our all-holy, immaculate, most [*People, quietly: "Most Holy Theotokos, save us"*] blessed and glorious Lady, the Theotokos and ever-virgin Mary, with all the saints, let us commend ourselves and each other and all our life unto Christ our God.
    response: To Thee, O Lord.

first_antiphon_prayer:
  text: For Thine is the might, and Thine is the kingdom and the power and the glory, of the Father and of the Son and of the Holy Spirit, now and ever and unto ages of ages.

second_antiphon_prayer:
  text: For Thou art a good God and lovest mankind and unto Thee do we ascribe glory, to the Father and of the Son and of the Holy Spirit, now and ever and unto ages of ages.

orthros_canon:
  text: For all the powers of heaven praise Thee, and unto Thee do they ascribe glory, to the Father and of the Son and of the Holy Spirit, now and ever and unto ages of ages.