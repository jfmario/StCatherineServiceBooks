
petitions:
  - text: In peace, let us pray to the Lord.
  - text: For the peace from above and the salvation of our souls, let us pray to the Lord.
  - text: For the peace of the whole world, the good estate of the holy churches of God and the union of all, let us pray to the Lord.
  - text: For this holy house and those who with faith, reverence, and fear of God enter therein, let us pray to the Lord.
  - text: For our father and Metropolitan SABA, the honorably presbytery, the diaconate in Christ, all the clergy and all the people, let us pray to the Lord.
  - text: For our country, its president, civil authorities, and armed forces, let us pray to the Lord.
  - text: For this city and every city and countryside and the faithful who dwell therein, let us pray to the Lord.
  - text: For healthful seasons, abundance of the fruits of the earth, and peaceful times, let us pray to the Lord.
  - text: For travelers by sea, by land, and by air, the sick, the suffering, the captive, and their salvation, let us pray to the Lord.
  - text: For our deliverance from all tribulation, wrath, danger, and necessity, let us pray to the Lord.
  - text: Help us; save us; have mercy on us; and keep us, O God, by Thy grace.
  - text: |
      Calling to remembrance our all-holy, immaculate, most [*People, quietly: "Most Holy Theotokos, save us"*] blessed and glorious Lady, the Theotokos and ever-virgin Mary, with all the saints, let us commend ourselves and each other and all our life unto Christ our God.
    response: To Thee, O Lord.

prayer:
  text: For unto Thee are due all glory, honor, and worship, to the Father and to the Son and to the Holy Spirit, now and ever, and unto ages of ages.
