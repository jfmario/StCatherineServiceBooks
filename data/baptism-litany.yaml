
petitions:
  - text: In peace, let us pray to the Lord.
  - text: For the peace from above, and for the salvation of our souls, let us pray to the Lord.
  - text: For the peace of the whole world; for the good estate of the holy Churches of God, and for the union of all, let us pray to the Lord.
  - text: For this holy house, and for those who with faith, reverence, and fear of God enter there, let us pray to the Lord.
  - text: For our father and Metropolitan SABA, for the honourable presbytery, the diaconate in Christ, for all the clergy and the people, let us pray to the Lord.
  - text: That this water may be sanctified with the power, and energy and visitation of the Holy Spirit, let us pray to the Lord.
  - text: That there may be sent down into it the grace of redemption, the blessing of Jordan, let us pray to the Lord.
  - text: That the purifying energy of the super-substantial Trinity may descend upon these waters, let us pray to the Lord.
  - text: That we may be illumined by the light of knowledge and piety by the visitation of the Holy Spirit, let us pray to the Lord.
  - text: That this water may be a preventative against every plot of enemies, both visible and invisible, let us pray to the Lord.
  - text: That they who are baptized therein may be made worthy of the kingdom incorruptible, let us pray to the Lord.
  - text: For them who are now come unto Holy Illumination, and for their salvation, let us pray to the Lord.
  - text: That they may prove themselves a child of the Light, and an heir of eternal good things, let us pray to the Lord.
  - text: That they may become planted with, and a communicant in, the death and resurrection of Christ our God, let us pray to the Lord.
  - text: That they may preserve the vestment of Baptism and the pledge of the Spirit pure and undefiled unto the fearful Day of Christ our God, let us pray to the Lord.
  - text: That this water may be unto them a washing of regeneration, unto the forgiveness of sins, and a garment of incorruption, let us pray to the Lord.
  - text: That the Lord God will hearken unto the voice of our petition, let us pray to the Lord.
  - text: That they and all of us may be delivered from all affliction, wrath, danger, and necessity, let us pray to the Lord.
  - text: Help us; save us; have mercy on us, and keep us, O God, by Thy grace.
  - text: |
      Calling to remembrance our all-holy, immaculate, most blessed and glorious Lady the Theotokos and ever-virgin Mary, with all the saints, let us commend ourselves and each other and all our life unto Christ our God.
    response: To Thee, O Lord.
