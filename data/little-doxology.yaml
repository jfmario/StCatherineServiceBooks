
verses:
  - Glory to God in the highest, and on earth peace, good-will towards men.
  - We praise Thee; we bless Thee; we worship Thee, we glorify Thee; we give thanks to Thee for Thy great glory.
  - O Lord, Heavenly King, God the Father Almighty. O Lord, the Only-Begotten Son, Jesus Christ, and the Holy Spirit.
  - 'O Lord God, Lamb of God, Son of the Father, that takest away the sin of the world: have mercy on us, Thou that takest away the sins of the world.'
  - Receive our prayer, Thou that sittest at the right hand of the Father, and have mercy on us.
  - For Thou only are holy; Thou only art Lord, Jesus Christ, to the glory of the God the Father. Amen.
  - Every day will I bless Thee, and I will praise Thy name for ever and ever, yea, for ever and ever.
  - Lord, unto Thee have I fled for refuge; teach me to do Thy will, for Thou art my God.
  - For in Thee is the fountain of life; in Thy light shall we see light.
  - O continue Thy mercy unto them that know Thee.
  - Vouchsafe, O Lord, to keep us this day without sin.
  - Blessed art Thou, O lord, the God of our fathers, and praised and glorified is Thy name unto the ages. Amen.
  - Let thy mercy, O Lord, be upon us, according as we have hoped in Thee.
  - Blessed art Thou, O Lord, teach my Thy statutes.
  - Blessed art Thou, O Master, teach my Thy statutes.
  - Blessed art Thou, O Holy One, enlighten me with Thy statutes.
  - Thy mercy, O Lord, endureth for ever. O despise not the works of Thy hands.
  - To Thee belongeth worship, to Thee belongeth praise, to Thee belongeth glory to the Father, and to the Son, and to the Holy Spirit, now and ever, and unto ages of ages. Amen.