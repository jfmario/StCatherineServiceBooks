name: Build and Release PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  LITURGICS_LIBRARY_BUCKET: ${{ secrets.LITURGICS_LIBRARY_BUCKET || vars.LITURGICS_LIBRARY_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify build configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${LITURGICS_LIBRARY_BUCKET:-}" ]]; then
            echo "::error::LITURGICS_LIBRARY_BUCKET is not set."
            echo "Add it under Settings → Secrets and variables → Actions:"
            echo "  - Repository secret: LITURGICS_LIBRARY_BUCKET (recommended), or"
            echo "  - Repository variable: LITURGICS_LIBRARY_BUCKET"
            missing=1
          fi

          if [[ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]]; then
            echo "::error::AWS_ACCESS_KEY_ID secret is not set."
            missing=1
          fi

          if [[ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]]; then
            echo "::error::AWS_SECRET_ACCESS_KEY secret is not set."
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "Using S3 bucket: ${LITURGICS_LIBRARY_BUCKET}"
          echo "Using AWS region: ${AWS_REGION}"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build project PDFs
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets
          found=0

          for project in projects/*.yaml; do
            base="$(basename "$project")"
            if [[ "$base" == test-* ]]; then
              echo "Skipping test project: $project"
              continue
            fi

            found=1
            echo "Building $project"
            python scripts/build.py "$project"

            pdf_name="$(python - <<PY
          import yaml
          from pathlib import Path
          data = yaml.safe_load(Path("$project").read_text(encoding="utf-8"))
          print(data["Filename"])
          PY
            )"

            cp "out/$pdf_name" "release-assets/$pdf_name"
          done

          if [[ "$found" -eq 0 ]]; then
            echo "No production project YAML files found in projects/."
            exit 1
          fi

          echo "Release assets:"
          ls -1 release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          name: Main build ${{ github.sha }}
          generate_release_notes: true
          prerelease: false
          files: release-assets/*.pdf
