    TocExempt: true
    Type: local-md
    Path: components/vespers/olihc-verses.md
  - Key: Stichera
    Name: Stichera
    TocExempt: true
    Type: local-md
    Path: components/vespers/stichera.md
  - Key: GladsomeLight
    Name: O Gladsome Light
